<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>404 - 页面走丢了</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💠</text></svg>">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
        <style>
            :root {
                color-scheme: dark;
                --text: #f5f7fb;
                --muted: rgba(245, 247, 251, 0.72);
            --accent: #8bc4ff;
            --accent-strong: #61a8ff;
            --border: rgba(255, 255, 255, 0.16);
            --glass: rgba(10, 16, 29, 0.5);
            --panel: rgba(255, 255, 255, 0.08);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

            body {
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 20px;
                font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(139, 196, 255, 0.28), transparent 30%),
                    radial-gradient(circle at bottom right, rgba(120, 219, 169, 0.12), transparent 24%),
                    linear-gradient(160deg, #09111f 0%, #10192d 48%, #1b2742 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 22rem;
            height: 22rem;
            border-radius: 50%;
            filter: blur(32px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            top: -8rem;
            left: -7rem;
            background: rgba(116, 182, 255, 0.18);
        }

        body::after {
            right: -7rem;
            bottom: -8rem;
            background: rgba(139, 196, 255, 0.12);
        }

            .panel {
                position: relative;
                z-index: 1;
                width: min(720px, 100%);
                padding: 40px 34px;
                border-radius: 28px;
                border: 1px solid var(--border);
                background: linear-gradient(180deg, rgba(10, 16, 29, 0.62), rgba(10, 16, 29, 0.46));
                box-shadow: var(--shadow);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                text-align: center;
                overflow: hidden;
            }

            .panel::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 18%);
                pointer-events: none;
            }

            .panel::after {
                content: "";
                position: absolute;
                right: -5rem;
                bottom: -5rem;
                width: 14rem;
                height: 14rem;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(139, 196, 255, 0.2), transparent 70%);
                pointer-events: none;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 8px 14px;
                border-radius: 999px;
                background: rgba(139, 196, 255, 0.12);
                color: #d9ecff;
                font-size: 0.9rem;
                margin-bottom: 18px;
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            }

            .code {
                font-size: clamp(4.8rem, 16vw, 8.4rem);
                line-height: 1;
                font-weight: 800;
                letter-spacing: 0.04em;
                margin-bottom: 16px;
                text-shadow: 0 0 30px rgba(139, 196, 255, 0.16);
            }

            h1 {
                font-size: clamp(1.7rem, 4vw, 2.5rem);
                margin-bottom: 14px;
                letter-spacing: 0.02em;
            }

            .desc {
                color: var(--muted);
                line-height: 1.85;
            font-size: 1.02rem;
            max-width: 34rem;
            margin: 0 auto;
        }

            .tips {
                margin: 28px auto 0;
                padding: 20px;
                border-radius: 20px;
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.05));
                border: 1px solid rgba(255, 255, 255, 0.1);
                text-align: left;
                max-width: 34rem;
            }

            .tips-title {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-size: 0.98rem;
                margin-bottom: 12px;
                color: #dce9f8;
            }

            .tips ul {
                list-style: none;
                display: grid;
                gap: 10px;
                color: var(--muted);
                line-height: 1.85;
            }

            .tips li {
                display: flex;
                align-items: flex-start;
                gap: 10px;
            }

            .tips li::before {
                content: "✦";
                color: #b8dbff;
                flex-shrink: 0;
                margin-top: 1px;
            }

            .actions {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 16px;
                margin-top: 30px;
            }

            .btn {
                display: inline-flex;
                justify-content: center;
                align-items: center;
                gap: 8px;
                min-width: 180px;
                padding: 14px 20px;
                border-radius: 16px;
                text-decoration: none;
                transition: transform 0.2s ease, box-shadow 0.2s ease;
                border: 1px solid transparent;
                font: inherit;
                cursor: pointer;
            }

            .btn-primary {
                background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
                color: #06111f;
            font-weight: 700;
            box-shadow: 0 12px 28px rgba(97, 168, 255, 0.28);
        }

            .btn-secondary {
                background: rgba(255, 255, 255, 0.08);
                color: var(--text);
                border: 1px solid rgba(255, 255, 255, 0.12);
            }

            .btn:hover {
                transform: translateY(-2px);
            }

            .footer-note {
                margin-top: 24px;
                color: rgba(245, 247, 251, 0.5);
                font-size: 0.92rem;
            }

            @media (max-width: 640px) {
                .panel {
                    padding: 26px 18px;
                    border-radius: 24px;
                }

                .actions {
                    flex-direction: column;
                }

                .btn {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <main class="panel">
            <div class="badge"><span aria-hidden="true">✦</span>页面未找到 · 404</div>
            <div class="code">404</div>
            <h1>这个页面好像走丢了</h1>
            <p class="desc">
                你访问的链接可能已经失效、被移动，或者输入时少了一段路径。
                可以先回到首页重新进入，也可以直接返回上一页继续浏览。
            </p>

            <section class="tips">
                <div class="tips-title"><span aria-hidden="true">🧭</span>你可以试试：</div>
                <ul>
                    <li>检查地址栏中的链接是否正确</li>
                    <li>返回首页查看最新的服务器入口信息</li>
                    <li>如果是收藏的旧链接，建议更新为最新地址</li>
                </ul>
            </section>

            <div class="actions">
                <a href="/" class="btn btn-primary"><span aria-hidden="true">⌂</span>返回首页</a>
                <button type="button" class="btn btn-secondary" id="go-back-btn"><span aria-hidden="true">↩</span>返回上一页</button>
            </div>

            <div class="footer-note">XTMC NETWORK · 饩雨的妙妙屋</div>
        </main>
        <script>
            document.getElementById('go-back-btn').addEventListener('click', () => {
                if (window.history.length > 1) {
                    window.history.back();
                    return;
                }

                window.location.href = '/';
            });
        </script>
    </body>
    </html>
